name: Develop CI/CD

on:
  push:
    branches:
      - develop
  workflow_dispatch:

concurrency:
  group: develop-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: mm-beauty-runner
    env:
      COMPOSE_PROJECT_NAME: mermaid-live-editor-beauty-develop
      DOCKER_BUILD_TARGET: mermaid
      HOST_PORT: 2300
      CONTAINER_PORT: 8080
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Notify deploy started
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          if [ -n "$GOOGLE_CHAT_WEBHOOK" ]; then
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
            TEXT=$(printf '%s\n\n%s\n%s\n%s\n' \
              '🚀 Starting Deploy [develop] Mermaid Live Editor FE...' \
              '👤 Deployed by: ${{ github.actor }}' \
              "🔗 Commit: ${COMMIT_URL}" \
              "📝 Message: ${COMMIT_MESSAGE}")
            PAYLOAD=$(TEXT="$TEXT" python3 -c 'import json, os; print(json.dumps({"text": os.environ["TEXT"]}))')
            curl -sS -X POST "$GOOGLE_CHAT_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD"
          fi

      - name: Prepare environment file
        run: |
          test -n "${{ vars.MERMAID_LIVE_EDITOR_BEAUTY_DEV_ENV }}"
          printf '%s\n' "${{ vars.MERMAID_LIVE_EDITOR_BEAUTY_DEV_ENV }}" > .env

      - name: Show Docker and Compose version
        run: |
          docker --version
          docker compose version

      - name: Stop current stack
        run: |
          docker compose down --remove-orphans || true

      - name: Build and start stack
        run: docker compose up -d --build

      - name: Verify stack
        run: |
          docker compose ps
          docker compose logs --tail 50 mermaid

      - name: Notify deploy success
        if: success()
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          if [ -n "$GOOGLE_CHAT_WEBHOOK" ]; then
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
            TEXT=$(printf '%s\n\n%s\n%s\n%s\n' \
              '✅ Deploy Success [develop] Mermaid Live Editor FE' \
              '👤 Deployed by: ${{ github.actor }}' \
              "🔗 Commit: ${COMMIT_URL}" \
              "📝 Message: ${COMMIT_MESSAGE}")
            PAYLOAD=$(TEXT="$TEXT" python3 -c 'import json, os; print(json.dumps({"text": os.environ["TEXT"]}))')
            curl -sS -X POST "$GOOGLE_CHAT_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD"
          fi

      - name: Notify deploy failure
        if: failure()
        env:
          GOOGLE_CHAT_WEBHOOK: ${{ secrets.GOOGLE_CHAT_WEBHOOK }}
        run: |
          if [ -n "$GOOGLE_CHAT_WEBHOOK" ]; then
            COMMIT_URL="${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
            COMMIT_MESSAGE="${{ github.event.head_commit.message }}"
            TEXT=$(printf '%s\n\n%s\n%s\n%s\n' \
              '❌ Deploy Failed [develop] Mermaid Live Editor FE' \
              '👤 Deployed by: ${{ github.actor }}' \
              "🔗 Commit: ${COMMIT_URL}" \
              "📝 Message: ${COMMIT_MESSAGE}")
            PAYLOAD=$(TEXT="$TEXT" python3 -c 'import json, os; print(json.dumps({"text": os.environ["TEXT"]}))')
            curl -sS -X POST "$GOOGLE_CHAT_WEBHOOK" \
              -H 'Content-Type: application/json' \
              -d "$PAYLOAD"
          fi
